<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacache & Naomie - RSVP</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0A1628;
  color:#FAF7F0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:0;
}

.form{
  width:90%;
  max-width:520px;
  background:rgba(255,255,255,0.06);
  border:1px solid #D4A84B;
  padding:30px;
  border-radius:8px;
}

h1{
  text-align:center;
  color:#D4A84B;
  margin-bottom:10px;
}

p{
  text-align:center;
  color:#ddd;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:1px solid rgba(212,168,75,0.5);
  background:rgba(255,255,255,0.08);
  color:white;
  box-sizing:border-box;
}

option{
  color:black;
}

textarea{
  min-height:100px;
}

button{
  width:100%;
  padding:14px;
  background:#D4A84B;
  color:#0A1628;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.msg{
  margin-top:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="form">
  <h1>Lacache & Naomie</h1>
  <p>Confirmation de présence</p>

  <input id="prenom" type="text" placeholder="Prénom *" required>
  <input id="nom" type="text" placeholder="Nom *" required>
  <input id="email" type="email" placeholder="Email *" required>
  <input id="phone" type="tel" placeholder="Téléphone">

  <select id="presence">
    <option value="Oui">Je serai présent(e)</option>
    <option value="Non">Je ne pourrai pas venir</option>
  </select>

  <textarea id="message" placeholder="Message optionnel"></textarea>

  <button id="submitBtn" onclick="submitForm()">Valider ma réponse</button>

  <div id="msg" class="msg"></div>
</div>

<script>
const CONFIG = {
  sbUrl: "https://mbtnqiotfbaagunpsvex.supabase.co",
  sbKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idG5xaW90ZmJhYWd1bnBzdmV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyNzU0NTQsImV4cCI6MjA4Mjg1MTQ1NH0.waMcpWUh8-sXoRFtzloxDsAqXvmsiVkAXjMJicvHFKI"
};

function getInviteCode(){
  const params = new URLSearchParams(window.location.search);
  return params.get("code");
}

async function saveRSVP(data){
  const response = await fetch(CONFIG.sbUrl + "/rest/v1/rsvps", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": CONFIG.sbKey,
      "Authorization": "Bearer " + CONFIG.sbKey,
      "Prefer": "return=representation"
    },
    body: JSON.stringify({
      invite_code: data.code,

      // Correction importante : ta table Supabase demande "name"
      name: data.prenom + " " + data.nom,

      prenom: data.prenom,
      nom: data.nom,
      email: data.email,
      telephone: data.phone,
      presence: data.presence,
      message: data.message,
      created_at: new Date().toISOString()
    })
  });

  if(!response.ok){
    const error = await response.text();
    throw new Error(error);
  }

  return await response.json();
}

async function submitForm(){
  const msg = document.getElementById("msg");
  const btn = document.getElementById("submitBtn");

  const code = getInviteCode();

  if(!code){
    msg.style.color = "#ffb4b4";
    msg.textContent = "❌ Code invité manquant. Merci d'utiliser le lien reçu par email.";
    return;
  }

  const prenom = document.getElementById("prenom").value.trim();
  const nom = document.getElementById("nom").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const presence = document.getElementById("presence").value;
  const message = document.getElementById("message").value.trim();

  if(!prenom || !nom || !email){
    msg.style.color = "#ffb4b4";
    msg.textContent = "❌ Merci de remplir prénom, nom et email.";
    return;
  }

  const data = {
    code,
    prenom,
    nom,
    email,
    phone,
    presence,
    message
  };

  try{
    btn.disabled = true;
    btn.textContent = "Enregistrement...";

    await saveRSVP(data);

    msg.style.color = "#4ade80";
    msg.textContent = "✅ Votre réponse a bien été enregistrée. Merci !";

    btn.textContent = "Réponse enregistrée";
  }catch(error){
    console.error(error);
    msg.style.color = "#ffb4b4";
    msg.textContent = "❌ Erreur sauvegarde RSVP : " + error.message;

    btn.disabled = false;
    btn.textContent = "Valider ma réponse";
  }
}
</script>

</body>
</html>
