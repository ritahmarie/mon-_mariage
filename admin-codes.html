<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:Arial;background:#0A1628;color:white;margin:0}
.header{padding:10px;background:#111;display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px;background:#D4A84B;border:none;cursor:pointer}
.filters{display:flex;flex-wrap:wrap;gap:5px;padding:10px}
.filter-btn{padding:8px;border:1px solid #ccc;cursor:pointer}
.filter-btn.active{background:#D4A84B;color:black}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:10px}
.card{border:1px solid #444;padding:10px}
.present{border-left:5px solid green}
.absent{border-left:5px solid red}
.pending{border-left:5px solid orange}
.scanned{border-left:5px solid gold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center}
.modal.open{display:flex}
</style>
</head>

<body>

<div class="header">
<button class="btn" onclick="loadCodes()">Actualiser</button>
<button class="btn" onclick="openScanner()">Scanner QR</button>
</div>

<div class="filters">
<button type="button" class="filter-btn active" onclick="setFilter('all', this)">Tous</button>
<button type="button" class="filter-btn" onclick="setFilter('confirmed', this)">RSVP</button>
<button type="button" class="filter-btn" onclick="setFilter('waiting', this)">En attente</button>
<button type="button" class="filter-btn" onclick="setFilter('present', this)">Présents</button>
<button type="button" class="filter-btn" onclick="setFilter('absent', this)">Absents</button>
<button type="button" class="filter-btn" onclick="setFilter('scanned', this)">Entrées</button>
</div>

<div id="cards" class="cards"></div>

<div id="scanModal" class="modal">
<div>
<div id="reader"></div>
<button onclick="closeScanner()">Fermer</button>
<div id="scanResult"></div>
</div>
</div>

<script>

const SB_URL="https://mbtnqiotfbaagunpsvex.supabase.co/rest/v1";
const SB_KEY="TA_CLE_ANON";

let codes=[];
let rsvps=[];
let currentFilter="all";
let scanner=null;

function normCode(c){return String(c||'').toLowerCase().trim()}

async function sb(url,method="GET",body=null){
  const res=await fetch(SB_URL+url,{
    method,
    headers:{
      apikey:SB_KEY,
      Authorization:"Bearer "+SB_KEY,
      "Content-Type":"application/json"
    },
    body:body?JSON.stringify(body):null
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadCodes(){
  try{
    codes=await sb("/invite_codes");
    rsvps=await sb("/rsvps");
    renderCards();
  }catch(e){
    alert("Erreur "+e.message);
  }
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderCards();
}

function getRsvp(code){
  return rsvps.find(r=>normCode(r.invite_code)===normCode(code));
}

function renderCards(){
  const container=document.getElementById("cards");

  let list=codes.filter(c=>{
    const r=getRsvp(c.code);

    if(currentFilter==="confirmed") return !!r;
    if(currentFilter==="waiting") return !r;
    if(currentFilter==="present") return r?.attendance==="present";
    if(currentFilter==="absent") return r?.attendance==="absent";
    if(currentFilter==="scanned") return c.scanned_entry;

    return true;
  });

  container.innerHTML=list.map(c=>{
    const r=getRsvp(c.code);
    const att=r?.attendance;

    let cls="card";
    if(c.scanned_entry) cls+=" scanned";
    else if(att==="present") cls+=" present";
    else if(att==="absent") cls+=" absent";
    else cls+=" pending";

    return `
    <div class="${cls}">
      <strong>${c.code}</strong><br>
      ${c.nom || ""}<br>
      ${r ? (r.prenom+" "+r.nom) : "Pas encore rempli"}<br>
      ${att || ""}
    </div>`;
  }).join("");
}

async function openScanner(){
  document.getElementById("scanModal").classList.add("open");

  scanner=new Html5Qrcode("reader");

  await scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    async code=>{
      await validateEntry(code);
    }
  );
}

async function closeScanner(){
  if(scanner){
    await scanner.stop();
    scanner.clear();
  }
  document.getElementById("scanModal").classList.remove("open");
}

async function validateEntry(raw){
  let value=raw;
  try{
    const url=new URL(raw);
    value=url.searchParams.get("code")||raw;
  }catch{}

  const code=normCode(value);
  const invite=codes.find(c=>normCode(c.code)===code);

  if(!invite){
    document.getElementById("scanResult").innerText="Code inconnu";
    return;
  }

  await sb(`/invite_codes?code=eq.${code}`,"PATCH",{
    scanned_entry:true
  });

  document.getElementById("scanResult").innerText="Entrée validée";

  await loadCodes();
}

loadCodes();

</script>

</body>
</html>
